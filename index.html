<style>
@font-face {
  font-family: Pixelar
  src: url(./Pixelar.woff2)
}
@media screen and (max-width: 900px) {
  canvas {
    width: 100vw !important;
    height: 100vh !important;
  }

  main p {
    font-size: 1.5rem !important;
  }
}
body {
  margin: 0;
  overflow-x: hidden;
  background-color: #050505;
}

main {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: -1;
  bottom: 0;
  font-family: VHS OSD Mono, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  height: 100vh;
  color: white;
}
main p {
  font-size: 4rem;
  margin: 0;
}
main a {
  cursor: pointer;
}

canvas {
  top: 0;
  left: 0;
  z-index: -2;
  position: absolute;
  background: #050505;
  width: 110vw;
  height: 110vh;
}

div {
  margin-top: 100vh;
  min-height: 100vh;
  background-color: white;
  padding: 5% 20%;
  font-size: 2rem;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
}
div a {
  display: flex;
  align-items: center;
  color: black;
  text-decoration: none;
  transition: font-weight 0.25s ease-in-out;
}
div a svg {
  margin-right: 1rem;
  transition: transform 0.25s ease-in-out;
}
div a:hover {
  font-weight: bold;
}
div a:hover svg {
  opacity: 0.5;
  transform: rotate(-20deg);
}

.telegram:hover {
  color: #0088cc !important;
}

.vk:hover {
  color: #2787F5 !important;
}
.btn-main {
  line-height: 50px;
  height: 50px;
  text-align: center;
  width: 250px;
  cursor: pointer;
}
.btn {
  color: #000;
  transition: all 0.5s;
  position: relative;
}
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  background-color: rgba(0,0,0,0.1);
  transition: all 0.3s;
}
.btn:hover::before {
  opacity: 0 ;
  transform: scale(0.5,0.5);
}
.btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0;
  transition: all 0.3s;
  border: 1px solid rgba(0,0,0,0.5);
  transform: scale(1,1);
}
.btn:hover::after {
  opacity: 1;
  transform: scale(1);
}
</style>
   <title>Ronan's personal website.</title>
</head>

   <canvas></canvas>
   <script>
// BACKGROUND
var canvas = document.getElementsByTagName('canvas')[0], ctx = canvas.getContext("2d");
var resetCanvas = function () {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var mult = window.innerWidth > 900 ? 1.1 : 1;
    canvas.width = window.innerWidth * mult;
    canvas.height = window.innerHeight * mult;
};
resetCanvas();
window.onresize = resetCanvas;
setInterval(function () {
    var x = Math.floor(Math.random() * canvas.offsetWidth);
    var y = Math.floor(Math.random() * canvas.offsetHeight);
    ctx.fillStyle = "#fafafa";
    ctx.fillRect(x, y, 1, 1);
    setTimeout(function () {
        ctx.fillStyle = "#050505";
        ctx.fillRect(x, y, 1, 1);
    }, 15000);
}, 75);
window.onmousemove = function (e) {
    var mouseX = e.clientX / window.innerWidth * 5;
    var mouseY = e.clientY / window.innerHeight * 5;
    if (window.innerWidth > 900)
        canvas.style.transform = "translate3d(-" + mouseX + "%, -" + mouseY + "%, 0)";
};
// PARALLAX EFFECT
window.onscroll = function () {
    canvas.style.top = Math.round(window.scrollY * 0.9).toString() + 'px';
    document.getElementsByTagName('main')[0].style.top = Math.round(window.scrollY / 2).toString() + 'px';
};
// GLITCH EFFECT
setInterval(function () {
    var msg1 = 'Hi, I\'m Ronan', msg2 = 'I do fun things online';
    var _loop_1 = function (i) {
        if (Math.random() > .99 && msg1[i] != ' ') {
            msg1 = setChar(msg1, i);
            setTimeout(function () {
                msg1 = setChar(msg1, i, 'Hi, I\'m Ronan'[i]);
            }, 300);
        }
    };
    for (var i = 0; i < msg1.length; i++) {
        _loop_1(i);
    }
    var _loop_2 = function (i) {
        if (Math.random() > .99 && msg2[i] != ' ') {
            msg2 = setChar(msg2, i);
            setTimeout(function () {
                msg2 = setChar(msg2, i, 'I do fun things online'[i]);
            }, 300);
        }
    };
    for (var i = 0; i < msg2.length; i++) {
        _loop_2(i);
    }
    document.querySelector('main p').innerHTML = msg1 + '<br>' + msg2;
}, 100);
function setChar(msg, i, char) {
    if (char === void 0) { char = Math.random().toString(36)[10]; }
    return msg.substr(0, i) + char + msg.substr(i + 1);
}
var scrollDown = function () { return window.scroll({
    top: window.innerHeight,
    behavior: 'smooth'
}); };
    </script>
